<script>
(async function bootDashboardDesktop() {
  AccApi.initResponsiveShell();
  const root = document.getElementById("acc-dashboard-root");
  const result = await AccApi.fetchDashboard();
  const data = result.data;

  document.getElementById("acc-api-status").innerHTML = AccApi.renderApiStatus(result);
  document.getElementById("acc-header-date").textContent = new Date().toLocaleDateString("ja-JP", { weekday: "short", year: "numeric", month: "long", day: "numeric" });
  document.getElementById("acc-sidebar-status").innerHTML = AccApi.renderSidebarStatus(data);

  root.innerHTML = AccApi.renderDashboardContent(data, false);
  AccApi.initSurplusBrief(root);
  AccApi.bindTapScale();
})();
