<script>
(async function bootDashboardMobile() {
  AccApi.initResponsiveShell?.();
  const root = document.getElementById("acc-dashboard-root");
  const result = await AccApi.fetchDashboard();
  const data = result.data;
  const m = data.metrics;

  document.getElementById("acc-api-status-mobile").innerHTML = AccApi.renderApiStatus(result);
  document.getElementById("acc-mobile-sidebar-status").textContent = m.status + " " + m.score + "/100";
  document.getElementById("acc-mobile-sidebar-status").className =
    "text-[10px] font-bold px-2 py-1 rounded-full inline-block " +
    AccApi.statusStyle(m.status).bg + " " + AccApi.statusStyle(m.status).text;

  root.innerHTML = AccApi.renderDashboardContent(data, true);
  AccApi.initSurplusBrief(root);
  AccApi.bindTapScale();
})();
</script>
