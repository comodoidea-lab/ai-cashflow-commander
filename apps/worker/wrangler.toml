name = "ai-cashflow-commander"
main = "src/index.ts"
compatibility_date = "2025-02-01"

[assets]
directory = "../../deploy"
binding = "ASSETS"
run_worker_first = true

[ai]
binding = "AI"

# AI Gateway — set via: wrangler secret put AI_GATEWAY_ACCOUNT_ID / AI_GATEWAY_NAME
# Or configure in [vars] for local dev
[vars]
AI_MODEL = "@cf/meta/llama-3.2-1b-instruct"
AI_GATEWAY_ENABLED = "false"
# Daily neuron budget guard (approx). Free tier = 10,000/day
AI_DAILY_NEURON_BUDGET = "8000"
# Skip LLM when true — Layer 2 fallback only
AI_POLISH_ENABLED = "true"

[observability]
enabled = true
