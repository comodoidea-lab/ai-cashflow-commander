  AccApi.initResponsiveShell();

  const data = result.data;

  AccApi.remountInsights(data, result);
  window.addEventListener("acc-density-change", () => {
    AccApi.remountInsights(data, result);
  });
  window.addEventListener("acc-gentle-change", () => {
    AccApi.remountInsights(data, result);
  });
})();
