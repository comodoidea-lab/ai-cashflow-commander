<script>
(async function bootInsightsMobile() {
  const result = await AccApi.fetchDashboard();
  const data = result.data;
  const m = data.metrics;

  document.getElementById("acc-api-status-mobile").innerHTML = AccApi.renderApiStatus(result);
  document.getElementById("acc-sidebar-status").textContent = m.status + " · Runway " + m.runwayDays + "日";
  document.getElementById("acc-insights-root").innerHTML = AccApi.renderSimulationPanel(data);
})();
</script>
<script>
        // Simple Interaction logic for active state and hover effects
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', function(e) {
                // If it's not a real link, prevent default for demo
                if(this.getAttribute('href') === '#') e.preventDefault();
                
                // Add click scale effect via code if not already via tailwind
                this.classList.add('scale-95');
                setTimeout(() => this.classList.remove('scale-95'), 150);
            });
        });

        // Simulating some interactive chart data tooltips or effects
        const chartBars = document.querySelectorAll('.chart-container > div');
        chartBars.forEach(bar => {
            bar.addEventListener('mouseenter', () => {
                bar.style.opacity = '0.8';
            });
            bar.addEventListener('mouseleave', () => {
                bar.style.opacity = '1';
            });
        });
    </script>
